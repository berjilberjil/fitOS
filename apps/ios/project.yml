name: fitOS
options:
  bundleIdPrefix: com.berjil
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "929G58HJFN"
targets:
  fitOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.berjil.fitos
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: fitOS
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "fitOS uses the mic so you can log meals by voice."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "fitOS transcribes your voice to log foods."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "fitOS uses Face ID to lock the app."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "fitOS reads your weight and steps from Apple Health."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "fitOS saves the weight you log to Apple Health."
    entitlements:
      path: fitOS.entitlements
      properties:
        com.apple.developer.healthkit: true
